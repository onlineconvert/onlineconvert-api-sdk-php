language: php

cache:
  directories:
    - $HOME/.composer/cache

matrix:
  include:
    - php: 8.0
    - php: 8.1
    - php: 8.2
    - php: 8.3
    - php: 8.4

before_install:
  - composer selfupdate

install:
  - composer install

script:
  - if [[ "$TRAVIS_BRANCH" == "master" && $TRAVIS_PULL_REQUEST == false ]];
    then
      echo "All tests running";
      vendor/bin/phpunit -c phpunit.xml;
    else
      echo "Only unit tests running";
      vendor/bin/phpunit -c phpunit.xml --testsuite unit;
    fi

env:
  global:
    - XDEBUG_MODE=coverage
